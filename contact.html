<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Contact — Rockio</title>
  <meta name="description" content="Contact Rockio.">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="authority.css">
</head>
<body data-page="contact">

  <header class="site-header">
    <a href="index.html" class="logo" aria-label="Rockio">
      <img src="images/logo-header.png" alt="Rockio" class="logo-img" width="187" height="48">
    </a>
    <nav class="site-nav" aria-label="Primary">
      <div class="site-nav-links">
        <a href="products.html">Products</a>
        <a href="contact.html">Contact</a>
        <a href="about.html">About</a>
        <a href="careers.html">Careers</a>
      </div>
    </nav>
    <button class="menu-toggle" aria-label="Open menu" aria-expanded="false">
      <span></span>
      <span></span>
    </button>
  </header>

  <div class="mobile-menu" aria-hidden="true">
    <nav aria-label="Mobile">
      <a href="products.html">Products</a>
      <a href="contact.html">Contact</a>
      <a href="about.html">About</a>
      <a href="careers.html">Careers</a>
    </nav>
  </div>

  <main class="site-page">
    <section class="home-contact home-contact--page">
      <div class="home-contact-inner home-contact-inner--page">
        <header class="home-contact-header page-intro-header">
          <p class="home-contact-label">Contact</p>
          <h1 class="home-contact-title">Tell us about your farm.</h1>
          <p class="home-contact-note">We read every message. Usually reply within two business days.</p>
          <p class="home-contact-direct home-contact-direct--inline">
            <a href="mailto:hello@rockio.com">hello@rockio.com</a><br>
            548 Market Street, Suite 35410 · San Francisco, CA 94104
          </p>
        </header>
        <form class="home-contact-form contact-form" method="post">
          <p class="form-status" role="status" aria-live="polite" hidden></p>
          <label>
            <span>Name</span>
            <input type="text" name="name" required autocomplete="name">
          </label>
          <label>
            <span>Email</span>
            <input type="email" name="email" required autocomplete="email">
          </label>
          <label>
            <span>Organization</span>
            <input type="text" name="organization" autocomplete="organization">
          </label>
          <label>
            <span>Acreage &amp; crops</span>
            <textarea name="message" rows="4" required placeholder="e.g. 800 acres, almonds and tomatoes"></textarea>
          </label>
          <button type="submit" class="cta">Send message</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer"></footer>

  <script src="form-config.js"></script>
  <script src="partials.js"></script>
  <script src="script.js"></script>
</body>
</html>
